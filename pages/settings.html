<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 허브 설정 - 황금농부</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="flex">
        <aside class="w-64 bg-gray-800 h-screen sticky top-0 p-6 border-r border-gray-700">
            <div class="flex items-center space-x-2 mb-10"><i class="fa-solid fa-wheat-awn text-yellow-500 text-xl"></i><span class="text-lg font-bold">GOLDEN FARMER</span></div>
            <nav class="space-y-4 text-sm">
                <a href="../index.html" class="block p-3 hover:bg-gray-700 rounded-lg">대시보드</a>
                <a href="sourcing.html" class="block p-3 hover:bg-gray-700 rounded-lg">상품 소싱</a>
                <a href="editor.html" class="block p-3 hover:bg-gray-700 rounded-lg">상세페이지</a>
                <a href="order.html" class="block p-3 hover:bg-gray-700 rounded-lg">발주 관리</a>
                <a href="finance.html" class="block p-3 hover:bg-gray-700 rounded-lg">매입/정산</a>
                <a href="settings.html" class="block p-3 bg-yellow-600 rounded-lg font-bold">데이터 허브</a>
            </nav>
        </aside>

        <main class="flex-1 p-10">
            <h2 class="text-2xl font-bold mb-6 italic text-yellow-500">SYSTEM DATA HUB</h2>
            <div class="max-w-2xl bg-gray-800 p-8 rounded-3xl border border-gray-700">
                <h3 class="text-lg font-bold mb-4">구글 스프레드시트 연동</h3>
                <p class="text-sm text-gray-400 mb-6">아래에 구글 시트 '웹에 게시(CSV)' 주소를 입력하고 저장하세요.</p>
                
                <input type="text" id="dbUrl" placeholder="https://docs.google.com/spreadsheets/d/..." class="w-full bg-gray-700 border-none rounded-xl px-4 py-3 text-sm mb-4 focus:ring-2 focus:ring-yellow-500">
                
                <button onclick="saveDB()" class="w-full bg-yellow-600 hover:bg-yellow-500 py-3 rounded-xl font-bold transition">시스템에 주소 등록하기</button>
                
                <div class="mt-8 p-4 bg-gray-900 rounded-xl text-xs text-gray-500 leading-relaxed">
                    <strong>작동 원리:</strong><br>
                    이곳에 주소를 저장하면, '상품 소싱', '발주 관리' 등 모든 페이지가 실시간으로 이 주소의 데이터를 읽어옵니다. 주소가 바뀔 때마다 코드를 수정할 필요가 없습니다.
                </div>
            </div>
        </main>
    </div>

    <script>
        function saveDB() {
            const url = document.getElementById('dbUrl').value;
            if(!url.includes('csv')) {
                alert('주소에 "csv"가 포함되어야 합니다. 웹에 게시 설정을 다시 확인하세요!');
                return;
            }
            localStorage.setItem('goldenFarmerDB', url);
            alert('성공! 이제 모든 페이지가 이 시트와 연결되었습니다.');
        }
        window.onload = () => {
            document.getElementById('dbUrl').value = localStorage.getItem('goldenFarmerDB') || "";
        }
    </script>
</body>
</html>
